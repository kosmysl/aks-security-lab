name: dependency-review

on:
    pull_request:
        branches:
            - main

permissions:
    contents: read
    pull-requests: read

jobs:
    dependency-review:
        runs-on: ubuntu-latest
        
        steps:
            - name: Dependency Review
              uses: actions/dependency-review-action@v4
              with:
                fail-on-severity: "high"

