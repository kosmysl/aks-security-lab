name: attatche-acr

on: 
    workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  RESOURCE_GROUP: rg-aks-sec-lab
  AKS_NAME: aks-sec-lab

jobs:
    attache-acr:
        runs-on: ubuntu-latest
        name: 00 Attache ACR to AKS aks-sec-lab
        environment: dev

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Log via OIDC to Azure
              uses: azure/login@v3
              with:
                client-id: ${{ vars.AZURE_CLIENT_ID }}
                tenant-id: ${{ vars.AZURE_TENANT_ID }}
                subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
            
            - name: Attache ACR to AKS
              run: |
                  az aks update \
                      --resource-group ${{ env.RESOURCE_GROUP }} \
                      --name ${{ env.AKS_NAME }} \
                      --attach-acr ${{ vars.ACR_NAME_SHORT }} \
                      --only-show-errors

            - name: Verify kublet identity
              run: |
                  az aks show \
                      --resource-group ${{ env.RESOURCE_GROUP }} \
                      --name ${{ env.AKS_NAME }} \
                      --query "identityProfile.kubeletIdentity" \
                      --only-show-errors