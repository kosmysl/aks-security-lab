name: create-aks

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  RESOURCE_GROUP: rg-aks-sec-lab
  LOCATION: polandcentral
  AKS_NAME: aks-sec-lab

jobs:
    create-aks:
        runs-on: ubuntu-latest
        name: Create AKS Cluster
        environment: dev

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Log via OIDC to Azure
              uses: azure/login@v3
              with:
                client-id: ${{ vars.AZURE_CLIENT_ID }}
                tenant-id: ${{ vars.AZURE_TENANT_ID }}
                subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

            - name: Verify Az context
              run: |
                az account show -o table
            
            - name: Creaate AKS cluster
              run: |
                 az aks create \
                        --resource-group "$RESOURCE_GROUP" \
                        --name "$AKS_NAME" \
                        --location "$LOCATION" \
                        --node-count 2 \
                        --node-vm-size Standard_B2ms \
                        --enable-managed-identity \
                        --enable-azure-rbac \
                        --network-plugin azure \
                        --network-plugin-mode overlay \
                        --generate-ssh-keys
                        --debug
                    

            - name: SHow AKS  state
              run: |
                    az aks show \
                        --resource-group ${{ env.RESOURCE_GROUP }} \
                        --name ${{ env.AKS_NAME }} 