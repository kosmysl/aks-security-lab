name: create-aks

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  RESOURCE_GROUP: rg-aks-sec-lab
  LOCATION: polandcentral
  AKS_NAME: aks-sec-lab

jobs:
    create-aks:
        runs-on: ubuntu-latest
        name: Create AKS Cluster
        environment: dev

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Log via OIDC to Azure
              uses: azure/login@v3
              with:
                client-id: ${{ vars.AZURE_CLIENT_ID }}
                tenant-id: ${{ vars.AZURE_TENANT_ID }}
                subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

            - name: Verify Az context
              run: |
                az account show -o table
            
            - name: Creaate AKS cluster
              run: |
                  if az aks show \
                  --resource-group ${{ env.RESOURCE_GROUP }} \
                  --name ${{ env.AKS_NAME }}\
                  --only-show-errors > /dev/null 2>&1; then
                      echo "AKS already exists. Skipping creation."
                      exit 0
                  fi

                  az aks create \
                      --resource-group ${{ env.RESOURCE_GROUP }} \
                      --name ${{ env.AKS_NAME }} \
                      --location ${{ env.LOCATION }} \
                      --enable-managed-identity \
                      --enable-aad \
                      --enable-azure-rbac \
                      --enable-private-cluster \
                      --network-plugin azure \
                      --node-count 1 \
                      --generate-ssh-keys
                    

            - name: Show AKS  state
              run: |
                    az aks show \
                        --resource-group ${{ env.RESOURCE_GROUP }} \
                        --name ${{ env.AKS_NAME }} 