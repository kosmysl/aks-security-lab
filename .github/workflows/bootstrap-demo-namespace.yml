name: bootstrap-demo-namespace.yml


on:
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

concurrency:
    group: aks-sec-lab
    cancel-in-progress: false

env:
    NAMESPACE: demo
    AKS_NAME: aks-sec-lab

jobs:
    bootstrap:
        runs-on: ubuntu-latest
        environment: dev

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Log via OIDC to Azure
              uses: azure/login@v3
              with:
                client-id: ${{ vars.AZURE_CLIENT_ID }}
                tenant-id: ${{ vars.AZURE_TENANT_ID }}
                subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

            - name: Install kubelogin
              run: |
                az aks install-cli

            - name: Configure kubectl for AKS
              shell: bash
              run: |
                az aks get-credentials \
                    --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
                    --name "${{ env.AKS_NAME }}" \
                    --file "${{ runner.temp }}/aks-kubeconfig" \
                    --overwrite-existing
                