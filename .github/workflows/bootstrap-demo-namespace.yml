name: bootstrap-demo-namespace.yml


on:
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

concurrency:
    group: aks-sec-lab
    cancel-in-progress: false

env:
    NAMESPACE: demo
    AKS_NAME: aks-sec-lab

jobs:
    bootstrap:
        runs-on: ubuntu-latest
        environment: dev

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Log via OIDC to Azure
              uses: azure/login@v3
              with:
                client-id: ${{ vars.AZURE_CLIENT_ID }}
                tenant-id: ${{ vars.AZURE_TENANT_ID }}
                subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

            - name: Install kubelogin
              run: |
                KUBELOGIN_VERSION="v0.2.19"

                 curl -fsSL \
                    "https://github.com/Azure/kubelogin/releases/download/${KUBELOGIN_VERSION}/kubelogin-linux-amd64.zip" \
                    -o /tmp/kubelogin.zip

                unzip -q /tmp/kubelogin.zip -d /tmp/kubelogin

                sudo install \
                    /tmp/kubelogin/bin/linux_amd64/kubelogin \
                    /usr/local/bin/kubelogin

                kubelogin --version





            - name: Configure kubectl for AKS
              shell: bash
              run: |
                az aks get-credentials \
                    --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
                    --name "${{ env.AKS_NAME }}" \
                    --file "${{ runner.temp }}/aks-kubeconfig" \
                    --overwrite-existing

                kubelogin convert-kubeconfig -l azurecli
            
                