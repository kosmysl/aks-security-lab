name: insecure-example

on:
    pull_request:
        branches:
            - main


permissions: write-all 

jobs:
    dangerous-job:
        runs-on: ubuntu-latest

        steps:
            - name: Create runner for insecure example
              uses: actions/checkout@v6 
              with:
                ref: ${{ github.event.pull_request.head.sha }}

            - name: Dangerous execution of PR-controlled code
              run: |
                chmod +x ./scripts/pr-script.sh
                ./scripts/pr-script.sh


