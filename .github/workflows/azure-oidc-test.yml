name: azure-oidc-test

on:
    workflow_dispatch:
    pull_request:
        branches:
            - main

permissions:
    id-token: write
    contents: read 

jobs:
    login:
        name: Test Azure OIDC login
        runs-on: ubuntu-latest
        environment: dev

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Login to Azure using OIDC
              uses: azure/login@v2
              with:
                client-id: ${{ secrets.AZURE_CLIENT_ID }}
                tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            
            - name: Show resorce group
              run: |
                az account show --name "${{ vars.AZURE_RESOURCE_GROUP}}" \
                --query "{name:name, location:location, provisioningState:properties.provisioningState }" -o table