name: deploy-day-6

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: aks-sec-lab
  cancel-in-progress: false

env:
  RESOURCE_GROUP: rg-aks-sec-lab
  LOCATION: polandcentral
  AKS_NAME: aks-sec-lab

jobs:
  deploy-day-6:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Set Env variables
        run: |
          echo "KUBECONFIG=${{ runner.temp }}/aks-kubeconfig" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Log via OIDC to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}


      - name: Install kubelogin
        run: |
          KUBELOGIN_VERSION="v0.2.19"

          curl -fsSL \
            "https://github.com/Azure/kubelogin/releases/download/${KUBELOGIN_VERSION}/kubelogin-linux-amd64.zip" \
            -o /tmp/kubelogin.zip

          unzip -q /tmp/kubelogin.zip -d /tmp/kubelogin

          sudo install \
            /tmp/kubelogin/bin/linux_amd64/kubelogin \
            /usr/local/bin/kubelogin

          kubelogin --version

      - name: Configure kubctl for AKS
        run: |
          az aks get-credentials \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AKS_NAME }}" \
            --file "$KUBECONFIG" \
            --overwrite-existing
          
          kubelogin convert-kubeconfig \
            --login  azurecli \
            --kubeconfig "$KUBECONFIG"

          kubectl \
            --kubeconfig "$KUBECONFIG" \
             config current-context

      - name: Deploy Service Account
        run: |
          kubectl \
            --kubeconfig "$KUBECONFIG" \
            apply -f k8s/day-6/serviceAccount.yml

      - name: Verify Service Account
        run: |
          kubectl \
            --kubeconfig "$KUBECONFIG" \
            get serviceaccount demo-api-sa \
            --namespace demo \
            --output yaml

      - name: Deploy Role
        run: |
          kubectl \
            --kubeconfig "$KUBECONFIG" \
            apply -f k8s/day-6/role-demo-api-reader.yml

      - name: Vrify Role
        run: |
          kubectl \
            --kubeconfig "$KUBECONFIG" \
            get role  demo-api-reader \
            --namespace demo \
            --output yaml

      - name: Deploy RoleBinding
        run: |
          kubectl \
            --kubeconfig "$KUBECONFIG" \
            apply -f k8s/day-6/rolebinding-demo-api-reader.yml

      - name: Verify RoleBinding
        run: |
          kubectl \
            --kubeconfig "$KUBECONFIG" \
            get rolebinding  demo-api-read-binding \
            --namespace demo \
            --output yaml        
                
      - name: Verify ServiceAccount RBAC permissions
        run: |
          if kubectl \
            --kubeconfig "$KUBECONFIG" \
            auth can-i get secrets \
            --as=system:serviceaccount:demo:demo-api-sa \
            --namespace demo
          then
            echo "Secrets read permission: yes"
          else
            echo "Secrets read permission: no"
          fi

          read=$(kubectl \
            --kubeconfig "$KUBECONFIG" \
            auth can-i get configmaps \
            --as=system:serviceaccount:demo:demo-api-sa \
            --namespace demo)

          echo "ConfigMaps read permission: $read"